services:
  neo4j:
    image: neo4j:5
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"   # веб-браузер Neo4j (http://<IP-машины>:7474)
      - "7687:7687"   # bolt-протокол (для loader.py и десктопного Neo4j Browser)
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  parsers:
    build: ./parsers
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"   # FastAPI: http://<IP-машины>:8000/docs
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    volumes:
      - ./parsers:/app          # код монтируется — правки конфига/кода без пересборки
      - parsers_cache:/app/cache
      - parsers_data:/app/data  # тут лежит state.db (sqlite)

volumes:
  neo4j_data:
  parsers_cache:
  parsers_data:
