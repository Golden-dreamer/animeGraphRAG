services:
  neo4j:
    image: neo4j:5
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 4G
      NEO4J_server_memory_pagecache_size: 2G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  airing-parser:
    build: ./parsers/anime
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "${PARSERS_PORT:-8567}:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      API_MIN_INTERVAL_SEC: ${API_MIN_INTERVAL_SEC:-0.5}
      API_RATE_WINDOW_SEC: ${API_RATE_WINDOW_SEC:-60}
      API_RATE_WINDOW_MAX: ${API_RATE_WINDOW_MAX:-55}
      API_MAX_RETRIES: ${API_MAX_RETRIES:-4}
      API_RETRY_BASE_DELAY: ${API_RETRY_BASE_DELAY:-1.5}
      API_RETRY_MAX_DELAY: ${API_RETRY_MAX_DELAY:-30}
      API_HTTP_TIMEOUT: ${API_HTTP_TIMEOUT:-20}
      MAL_BASE_URL: ${MAL_BASE_URL:-https://myanimelist.net}
      BATCH_SIZE: ${BATCH_SIZE:-50}
      CYCLE_INTERVAL_SEC: ${CYCLE_INTERVAL_SEC:-86400}
      COORDINATOR_URL: http://coordinator:8000
      PYTHONPATH: /shared
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - ./parsers/anime:/app
      - ./parsers:/shared:ro

  graphrag:
    build: ./backend
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8666:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      GRAPHRAG_LLM_BASE_URL: ${GRAPHRAG_LLM_BASE_URL:-https://ollama.com/v1}
      GRAPHRAG_LLM_API_KEY: ${OLLAMA_API_KEY}
      GRAPHRAG_LLM_MODEL: ${GRAPHRAG_LLM_MODEL:-glm-5.2}
      GRAPHRAG_LLM_MAX_TOKENS: ${GRAPHRAG_LLM_MAX_TOKENS:-8192}
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
      - graphrag_data:/data

  user-anime:
    build: ./parsers/user_anime
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "${USER_ANIME_PORT:-8568}:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      MAL_BASE_URL: ${MAL_BASE_URL:-https://myanimelist.net}
      API_MIN_INTERVAL_SEC: ${API_MIN_INTERVAL_SEC:-0.5}
      API_RATE_WINDOW_SEC: ${API_RATE_WINDOW_SEC:-60}
      API_RATE_WINDOW_MAX: ${API_RATE_WINDOW_MAX:-55}
      USER_STATS_BATCH_SIZE: ${USER_STATS_BATCH_SIZE:-50}
      COORDINATOR_URL: http://coordinator:8000
      PYTHONPATH: /shared
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - ./parsers/user_anime:/app
      - ./parsers:/shared:ro

  user-user:
    build: ./parsers/user_user
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "${USER_USER_PORT:-8569}:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      MAL_BASE_URL: ${MAL_BASE_URL:-https://myanimelist.net}
      API_MIN_INTERVAL_SEC: ${API_MIN_INTERVAL_SEC:-0.5}
      API_RATE_WINDOW_SEC: ${API_RATE_WINDOW_SEC:-60}
      API_RATE_WINDOW_MAX: ${API_RATE_WINDOW_MAX:-55}
      USER_REFRESH_BATCH_SIZE: ${USER_REFRESH_BATCH_SIZE:-50}
      COORDINATOR_URL: http://coordinator:8000
      PYTHONPATH: /shared
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - ./parsers/user_user:/app
      - ./parsers:/shared:ro

  coordinator:
    build: ./parsers
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "${COORDINATOR_PORT:-8570}:8000"
    environment:
      ANIME_PARSER_URL: http://airing-parser:8000
      USER_ANIME_URL: http://user-anime:8000
      USER_USER_URL: http://user-user:8000
      ANIME_PARSER_TIME: ${ANIME_PARSER_TIME:-03:00}
      COORDINATOR_USER_SLICE_SEC: ${COORDINATOR_USER_SLICE_SEC:-1800}
      COORDINATOR_IDLE_WAIT_SEC: ${COORDINATOR_IDLE_WAIT_SEC:-300}
      COORDINATOR_BATCH_SIZE: ${COORDINATOR_BATCH_SIZE:-5}
      TZ: ${TZ:-Europe/Moscow}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    volumes:
      - ./parsers/coordinator_app.py:/app/coordinator_app.py

volumes:
  neo4j_data:
  graphrag_data: