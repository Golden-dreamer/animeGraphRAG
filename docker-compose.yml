services:
  neo4j:
    image: neo4j:5
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      # --- память: heap для транзакций/запросов, pagecache для данных на диске ---
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 4G
      NEO4J_server_memory_pagecache_size: 2G
    ports:
      - "7474:7474"   # веб-браузер Neo4j (http://<IP-машины>:7474)
      - "7687:7687"   # bolt-протокол (для loader.py и десктопного Neo4j Browser)
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  parsers:
    build: ./parsers
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "${PARSERS_PORT:-8567}:8000"   # FastAPI: http://<IP-машины>:${PARSERS_PORT}
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      # --- лимиты парсинга MyAnimeList (можно менять без пересборки) ---
      API_MIN_INTERVAL_SEC: ${API_MIN_INTERVAL_SEC:-0.5}
      API_RATE_WINDOW_SEC: ${API_RATE_WINDOW_SEC:-60}
      API_RATE_WINDOW_MAX: ${API_RATE_WINDOW_MAX:-55}
      API_MAX_RETRIES: ${API_MAX_RETRIES:-4}
      API_RETRY_BASE_DELAY: ${API_RETRY_BASE_DELAY:-1.5}
      API_RETRY_MAX_DELAY: ${API_RETRY_MAX_DELAY:-30}
      API_HTTP_TIMEOUT: ${API_HTTP_TIMEOUT:-20}
      MAL_BASE_URL: ${MAL_BASE_URL:-https://myanimelist.net}
    volumes:
      - ./parsers:/app                    # код монтируется — правки конфига/кода без пересборки

  sandbox:
    build: ./sandbox
    restart: "no"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      GRAPHRAG_LLM_BASE_URL: ${GRAPHRAG_LLM_BASE_URL:-https://ollama.com/v1}
      GRAPHRAG_LLM_API_KEY: ${OLLAMA_API_KEY}
      GRAPHRAG_LLM_MODEL: ${GRAPHRAG_LLM_MODEL:-glm-5.2}
      GRAPHRAG_LLM_MAX_TOKENS: ${GRAPHRAG_LLM_MAX_TOKENS:-8192}
      GRAPHRAG_DB_PATH: /data/graphrag.db
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./parsers:/app/parsers
      - graphrag_data:/data
    entrypoint: ["sleep", "infinity"]

  graphrag:
    build: ./backend
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8666:8000"   # GraphRAG UI: http://<IP-машины>:8666
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      GRAPHRAG_LLM_BASE_URL: ${GRAPHRAG_LLM_BASE_URL:-https://ollama.com/v1}
      GRAPHRAG_LLM_API_KEY: ${OLLAMA_API_KEY}
      GRAPHRAG_LLM_MODEL: ${GRAPHRAG_LLM_MODEL:-glm-5.2}
      GRAPHRAG_LLM_MAX_TOKENS: ${GRAPHRAG_LLM_MAX_TOKENS:-8192}
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
      - graphrag_data:/data

volumes:
  neo4j_data:
  graphrag_data: