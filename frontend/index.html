<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime GraphRAG</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">+ Новый чат</button>
      </div>
      <div class="chat-list" id="chatList"></div>
      <div class="sidebar-footer">
        <a href="/logs" target="_blank" class="logs-link">Логи запросов</a>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <!-- Chat view -->
      <div id="chatView" class="chat-view">
        <div class="chat-header">
          <button class="toggle-sidebar" id="toggleSidebar">☰</button>
          <span class="chat-title" id="chatTitle">Anime GraphRAG</span>
          <div class="header-actions">
            <button class="think-btn" id="thinkBtn" title="Переключить thinking режим">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"></path>
              </svg>
              <span class="think-label">Think</span>
            </button>
            <button class="gear-btn" id="gearBtn" title="Настройки модели">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="messages" id="messages">
          <div class="welcome">
            <h1>Anime GraphRAG</h1>
            <p>Спросите меня о любом аниме, режиссёре, студии, сэйю или персонаже.</p>
            <div class="examples">
              <button class="example-btn" data-q="Кто режиссёр Fullmetal Alchemist: Brotherhood и что он ещё снимал?">Кто режиссёр FMA:B?</button>
              <button class="example-btn" data-q="Топ-10 аниме студии Kyoto Animation по оценкам">Топ аниме KyoAni</button>
              <button class="example-btn" data-q="Какие жанры у One Piece?">Жанры One Piece</button>
              <button class="example-btn" data-q="Сэйю с наибольшим числом ролей">Топ сэйю по ролям</button>
            </div>
          </div>
        </div>

        <div class="input-area">
          <div class="input-wrapper">
            <textarea id="input" placeholder="Спросите о любом аниме..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn" disabled>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Settings panel (hidden by default) -->
      <div id="settingsView" class="settings-view" style="display:none">
        <div class="chat-header">
          <button class="back-btn" id="backBtn" title="Назад к чату">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
          </button>
          <span class="chat-title">Настройки модели</span>
        </div>

        <div class="settings-body">
          <div class="settings-section">
            <label>
              <span class="setting-label">Модель</span>
              <input type="text" id="setModel" placeholder="gemma4:12b">
            </label>
            <label>
              <span class="setting-label">Base URL</span>
              <input type="text" id="setBaseUrl" placeholder="http://localhost:11434/v1">
            </label>
            <label>
              <span class="setting-label">API Key <span class="muted">(пусто = из .env)</span></span>
              <input type="password" id="setApiKey" placeholder="оставьте пустым для .env">
            </label>
            <label>
              <span class="setting-label">Max Tokens</span>
              <input type="number" id="setMaxTokens" placeholder="8192" min="256" max="32768">
            </label>
          </div>

          <div class="settings-section">
            <label>
              <span class="setting-label">Cypher System Prompt <span class="muted">(пусто = по умолчанию)</span></span>
              <textarea id="setCypherPrompt" rows="6" placeholder="Оставьте пустым для стандартного промпта"></textarea>
            </label>
            <label>
              <span class="setting-label">Answer System Prompt <span class="muted">(пусто = по умолчанию)</span></span>
              <textarea id="setAnswerPrompt" rows="4" placeholder="Оставьте пустым для стандартного промпта"></textarea>
            </label>
          </div>

          <div class="settings-actions">
            <button class="save-settings-btn" id="saveSettingsBtn">Сохранить</button>
            <span class="settings-hint">Настройки применяются на текущую сессию. При перезапуске контейнера — сброс к .env.</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
