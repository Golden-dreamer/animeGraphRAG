# Все значения можно переопределить через переменные окружения (см. .env и docker-compose.yml)

batch_size: 50              # размер порции для одного запроса к БД (не лимитирует API)
cycle_interval_sec: 86400   # пауза между циклами (1 раз в день — scheduler делает все запросы за цикл)
cache_max_mb: 10240         # лимит размера кэша (10 ГБ), старое чистится автоматически

max_attempts: 3             # сколько раз повторить обработку тайтла при ошибке, прежде чем пометить failed
retry_backoff_minutes: 5    # пауза между повторами при ошибке

# Лимиты парсинга MyAnimeList настраиваются через .env (см. переменные API_*).
# Значения по умолчанию (в коде fetcher.py):
#   API_MIN_INTERVAL_SEC=0.5  (2 запроса/сек, запас от лимита 3/сек)
#   API_RATE_WINDOW_SEC=60
#   API_RATE_WINDOW_MAX=55   (запрос от лимита 60/мин)
#   API_MAX_RETRIES=4
#   API_RETRY_BASE_DELAY=1.5
#   API_RETRY_MAX_DELAY=30
#   API_HTTP_TIMEOUT=20
#   MAL_BASE_URL=https://myanimelist.net
# При превышении — fetcher ждёт освобождения слота, ошибки ретраятся.

# Правила, когда перепроверять тайтл (next_check_at)
refresh_current_days: 1     # текущий и следующий сезон — раз в сутки
refresh_previous_days: 7    # прошлый сезон — раз в неделю
refresh_recent_years: 3     # "относительно новые" — младше этого возраста (лет)
refresh_recent_days: 365    # для них — раз в год
# всё, что старше refresh_recent_years — не обновляется автоматически никогда
# (обновить можно только принудительно через POST /refresh/{mal_id})